# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Rafi Indrajaya's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Rafi Indrajaya
headline: Energy Systems Optimization Engineer
description: |
  Hello there, welcome to my portfolio page!

  <br>

  I'm a master's researcher at FEV Europe GmbH and a 2nd-year Erasmus Mundus DENSYS student at Politecnico di Torino, specializing in energy system optimization, AI/ML, and Power-to-X technologies.
  With 2+ years of industry experience across Germany, Japan, and Indonesia, I build optimization frameworks and data pipelines for complex energy systems — from hybrid biomass Power-to-Methanol plants to residential microgrids.
  I work primarily in Python (Pyomo, PyPSA, oemof, Scikit-learn, Gymnasium) and apply MILP, agentic AI, and Bayesian optimization to solve real-world sizing and dispatch problems.
  My work spans fuel cells, geothermal systems, PV microgrids, and hydrogen/methanol production — all driven by a passion for making the energy transition technically rigorous and economically viable.


